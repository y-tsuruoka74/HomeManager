# プレフィックスキーを Ctrl+a に変更
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 基本設定
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g history-limit 50000
set -g focus-events on

# ウィンドウ分割（直感的なキーに変更）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新規ウィンドウをカレントパスで開く
bind c new-window -c "#{pane_current_path}"

# 自動リネームを無効化（手動で名前をつけたとき上書きされないよう）
set -g automatic-rename off

# vim-tmux-navigator: Ctrl+hjkl でペイン移動
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# コピーモードを vi キーバインドに
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ステータスバー設定
set -g status-position bottom
set -g status-style "bg=#1a1a2e,fg=#9c7af2"
set -g status-left "#[bg=#9c7af2,fg=#1a1a2e,bold] #S #[bg=#1a1a2e,fg=#9c7af2]"
set -g status-left-length 20
set -g status-right "#[fg=#6EADD8]%Y-%m-%d %H:%M"
set -g status-right-length 30

# ウィンドウステータス
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#9c7af2,fg=#1a1a2e,bold] #I:#W "
setw -g window-status-style "fg=#888888"

# ペインボーダー
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#9c7af2"

# ペインリサイズ（繰り返し入力しやすいよう -r オプション付き）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 設定リロード
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
